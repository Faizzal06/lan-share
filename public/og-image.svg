<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1100" cy="530" r="120" fill="rgba(255,255,255,0.1)"/>
  <circle cx="600" cy="315" r="200" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Connection Lines -->
  <line x1="300" y1="250" x2="900" y2="250" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="10,5"/>
  <line x1="300" y1="380" x2="900" y2="380" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="10,5"/>
  
  <!-- Main Icon - Lightning Bolt -->
  <g transform="translate(600, 315)" filter="url(#glow)">
    <polygon points="-60,-80 -20,-80 -20,-40 20,-40 20,0 -20,0 -20,80 20,40 20,80 -20,80 -20,40 -60,40" 
             fill="#fbbf24" stroke="#f59e0b" stroke-width="3"/>
  </g>
  
  <!-- Device Icons -->
  <g transform="translate(300, 250)">
    <rect x="-40" y="-40" width="80" height="60" rx="8" fill="white" opacity="0.9"/>
    <rect x="-30" y="-30" width="60" height="40" rx="4" fill="#667eea"/>
    <circle cx="0" cy="35" r="5" fill="white"/>
  </g>
  
  <g transform="translate(900, 250)">
    <rect x="-40" y="-40" width="80" height="60" rx="8" fill="white" opacity="0.9"/>
    <rect x="-30" y="-30" width="60" height="40" rx="4" fill="#764ba2"/>
    <circle cx="0" cy="35" r="5" fill="white"/>
  </g>
  
  <g transform="translate(300, 380)">
    <rect x="-35" y="-35" width="70" height="50" rx="12" fill="white" opacity="0.9"/>
    <rect x="-25" y="-25" width="50" height="30" rx="4" fill="#667eea"/>
  </g>
  
  <g transform="translate(900, 380)">
    <rect x="-35" y="-35" width="70" height="50" rx="12" fill="white" opacity="0.9"/>
    <rect x="-25" y="-25" width="50" height="30" rx="4" fill="#764ba2"/>
  </g>
  
  <!-- Arrow between devices -->
  <g transform="translate(600, 315)">
    <path d="M -150 0 L -100 0 M -100 -15 L -100 15 M -100 0 L -120 -10 M -100 0 L -120 10" 
          stroke="white" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M 150 0 L 100 0 M 100 -15 L 100 15 M 100 0 L 120 -10 M 100 0 L 120 10" 
          stroke="white" stroke-width="3" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Main Title -->
  <text x="600" y="180" text-anchor="middle" font-family="'Space Grotesk', Arial, sans-serif" 
        font-size="72" font-weight="700" fill="white" filter="url(#shadow)">
    Kirimly
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="230" text-anchor="middle" font-family="'Space Grotesk', Arial, sans-serif" 
        font-size="32" font-weight="500" fill="rgba(255,255,255,0.9)">
    Berbagi File P2P
  </text>
  
  <!-- Tagline -->
  <text x="600" y="520" text-anchor="middle" font-family="'Space Grotesk', Arial, sans-serif" 
        font-size="24" font-weight="400" fill="rgba(255,255,255,0.85)">
    Tanpa Server • Cepat • Aman
  </text>
  
  <!-- Bottom accent -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(255,255,255,0.1)"/>
  <text x="600" y="622" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="16" font-weight="400" fill="rgba(255,255,255,0.6)">
    kirimly.my.id
  </text>
</svg>
